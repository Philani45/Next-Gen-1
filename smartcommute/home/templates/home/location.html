{% extends "home/base.html" %}

{% block content %}

<h2 class="title">Starting Location Setup</h2>

<div class="location-container">

    <!-- Django Form -->
    <form method="POST" class="form-box">
        {% csrf_token %}

        <label for="id_address">Enter Your Starting Location</label>
        {{ form.address }}

        <button type="submit" class="save-btn">Save Location</button>
    </form>

    <!-- Display Saved Location -->
    {% if saved_location %}
        <h3 class="subtitle">Saved Location</h3>
        <p class="saved-text">{{ saved_location }}</p>
    {% endif %}

</div>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    .title {
        text-align: center;
        margin-top: 30px;
        color: #1e4d8a;
    }

    .location-container {
        width: 80%;
        margin: 20px auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 25px;
    }

    label {
        font-weight: bold;
    }

    input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 100%;
    }

    .save-btn {
        margin-top: 10px;
        padding: 12px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    .save-btn:hover {
        background: #357ab8;
    }

    .subtitle {
        margin-top: 10px;
        color: #1e4d8a;
    }

    .saved-text {
        background: #e8eef7;
        padding: 12px;
        border-radius: 6px;
    }
</style>

{% endblock %}
