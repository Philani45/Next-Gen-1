{% extends "home/base.html" %}
{% load static %}
{% block content %}

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"
/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<!-- Passio integration JS (you created this as home/static/home/js/passio.js) -->
<script src="{% static 'home/js/passio.js' %}"></script>

<style>
    .map-container {
        width: 90%;
        max-width: 1100px;
        margin: 30px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.12);
        position: relative;
    }

    #map {
        height: 600px;
        width: 100%;
        border-radius: 10px;
    }

    .title {
        text-align: center;
        color: #1e4d8a;
        margin-bottom: 10px;
        font-size: 1.6rem;
        font-weight: 600;
    }

    .subtitle {
        text-align: center;
        color: #555;
        margin-bottom: 15px;
        font-size: 0.95rem;
    }

    .back-btn {
        position: absolute;
        top: -10px;
        left: 0;
        padding: 6px 12px;
        background-color: #4a90e2;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: white;
    }

    .back-btn:hover {
        background-color: #357ab8;
    }

    .legend {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background: rgba(255,255,255,0.95);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        box-shadow: 0 0 6px rgba(0,0,0,0.15);
    }

    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 4px;
    }

    .legend-color {
        width: 14px;
        height: 4px;
        border-radius: 2px;
        margin-right: 6px;
    }
</style>

<div class="map-container">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <h2 class="title">Route to Your Class</h2>
    <p class="subtitle">
        From your saved location to: <strong>{{ building.name }}</strong>
    </p>
    <div id="map"></div>

    <div class="legend">
        <div class="legend-item">
            <span class="legend-color" style="background:#007bff;"></span> Shuttle Route (Blue)
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#28a745;"></span> Shuttle Route (Green)
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#ffcc00;"></span> Shuttle Route (Gold)
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#6f42c1;"></span> Shuttle Route (Purple)
        </div>
        <div class="legend-item">
            <span class="legend-color" style="background:#000; height:8px; width:8px; border-radius:50%;"></span>
            Shuttle Stop
        </div>
    </div>
</div>

<script>

    // ==========================
    // Base map + routing
    // ==========================
    const map = L.map('map').setView(
        [userLocation.lat, userLocation.lng],
        15
    );

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // User + class markers
    const userMarker = L.marker([userLocation.lat, userLocation.lng]).addTo(map)
        .bindPopup("Your Location");

    const classMarker = L.marker([classBuilding.lat, classBuilding.lng]).addTo(map)
        .bindPopup(classBuilding.name);

    // Route from user → class
    L.Routing.control({
        waypoints: [
            L.latLng(userLocation.lat, userLocation.lng),
            L.latLng(classBuilding.lat, classBuilding.lng)
        ],
        routeWhileDragging: false,
        addWaypoints: false,
        draggableWaypoints: false,
        show: false
    }).addTo(map);

  
    // Passio GO! integration
    // (functions come from passio.js)

    
    // Shuttle stops
    async function drawPassioStops() {
        try {
            const stops = await fetchStops();
            stops.forEach(stop => {
                L.circleMarker([stop.lat, stop.lng], {
                    radius: 6,
                    color: "#000",
                    fillColor: "#ffcc00",
                    fillOpacity: 1
                }).addTo(map).bindPopup(stop.name);
            });
        } catch (e) {
            console.error("Error loading Passio stops:", e);
        }
    }

    // Shuttle routes (as polylines)
    async function drawPassioRoutes() {
        try {
            const routes = await fetchRoutes();
            routes.forEach(async route => {
                try {
                    const shapeData = await fetchRouteShape(route.id);
                    L.polyline(shapeData.shape, {
                        color: route.color || "#007bff",
                        weight: 4,
                        opacity: 0.8
                    }).addTo(map).bindPopup(route.name);
                } catch (e) {
                    console.error("Error loading route shape:", route.id, e);
                }
            });
        } catch (e) {
            console.error("Error loading Passio routes:", e);
        }
    }

    // Live buses
    let busMarkers = {};

    async function drawLiveBuses() {
        try {
            const data = await fetchVehicles();
            if (!data || !data.vehicles) return;

            data.vehicles.forEach(bus => {
                const id = bus.id;
                const latlng = [bus.lat, bus.lng];

                if (busMarkers[id]) {
                    busMarkers[id].setLatLng(latlng);
                } else {
                    busMarkers[id] = L.marker(latlng, {
                        icon: L.icon({
                            iconUrl: "https://cdn-icons-png.flaticon.com/512/61/61212.png",
                            iconSize: [28, 28]
                        })
                    }).addTo(map).bindPopup(`Bus ${id}`);
                }
            });
        } catch (e) {
            console.error("Error loading Passio vehicles:", e);
        }
    }

    // Initial draws
    drawPassioStops();
    drawPassioRoutes();
    drawLiveBuses();

    // Refresh buses every 10 seconds
    setInterval(drawLiveBuses, 10000);
</script>

{% endblock %}
